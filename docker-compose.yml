name: medicore 

services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - appointment-service
      - payment-service
      - notification-service
      - telemedicine-service

  auth-service:
    build: ./auth-service
    ports:
      - "3001:3000"
    env_file: .env
    volumes:
      - ./shared:/app/shared
    depends_on:
      - postgres

  patient-service:
    build: ./patient-service
    ports:
      - "3002:3000"
    env_file: .env
    volumes:
      - ./shared:/app/shared
    depends_on:
      - postgres

  doctor-service:
    build: ./doctor-service
    ports:
      - "3003:3000"
    env_file: .env
    volumes:
      - ./shared:/app/shared
    depends_on:
      - postgres

  appointment-service:
    build: ./appointment-service
    ports:
      - "3004:3000"
    env_file: .env
    volumes:
      - ./shared:/app/shared
    depends_on:
      - postgres

  payment-service:
    build: ./payment-service
    ports:
      - "3005:3000"
    env_file: .env
    volumes:
      - ./shared:/app/shared
    depends_on:
      - postgres

  notification-service:
    build: ./notification-service
    ports:
      - "3006:3000"
    env_file: .env
    volumes:
      - ./shared:/app/shared

  telemedicine-service:
    build: ./telemedicine-service
    ports:
      - "3007:3000"
    env_file: .env
    volumes:
      - ./shared:/app/shared

  ai-symptom-service:
    build: ./ai-symptom-service
    ports:
      - "3008:3000"
    env_file: .env
    volumes:
      - ./shared:/app/shared

  admin-service:
    build: ./admin-service
    ports:
      - "3009:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-medicore}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata: