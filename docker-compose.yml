name: medicore 

services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    env_file: ./api-gateway/.env       
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - appointment-service
      - payment-service
      - notification-service
      - telemedicine-service

  auth-service:
    build: ./auth-service
    ports:
      - "3001:3000"
    env_file: ./auth-service/.env
    volumes:
      - ./shared:/app/shared
    

  patient-service:
    build: ./patient-service
    ports:
      - "3002:3000"
    env_file: ./patient-service/.env
    volumes:
      - ./shared:/app/shared
    

  doctor-service:
    build: ./doctor-service
    ports:
      - "3003:3000"
    env_file: ./doctor-service/.env
    volumes:
      - ./shared:/app/shared
      - ./doctor-service/uploads:/app/uploads
   

  appointment-service:
    build: ./appointment-service
    ports:
      - "3004:3000"
    env_file: ./appointment-service/.env  
    volumes:
      - ./shared:/app/shared
    

  payment-service:
    build: ./payment-service
    ports:
      - "3005:3000"
    env_file: ./payment-service/.env       # ← was: .env (root)
    volumes:
      - ./shared:/app/shared

  notification-service:
    build: ./notification-service
    ports:
      - "3006:3000"
    env_file: ./notification-service/.env  
    volumes:
      - ./shared:/app/shared

  telemedicine-service:
    build: ./telemedicine-service
    ports:
      - "3007:3000"
    env_file: ./telemedicine-service/.env  
    volumes:
      - ./shared:/app/shared

  ai-symptom-service:
    build: ./ai-symptom-service
    ports:
      - "3008:3000"
    env_file: ./ai-symptom-service/.env   
    volumes:
      - ./shared:/app/shared

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin

 